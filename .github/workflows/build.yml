name: Build Chinese Meteor Client

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Build number
        required: false
        type: string
        default: ''
      upstream_ref:
        description: 'Upstream branch/tag/commit (e.g. 1.21.1, master)'
        required: false
        type: string
        default: master
      skip_translate:
        description: 'Skip translation step: patches + build only (no Chinese strings)'
        required: false
        type: boolean
        default: false
      skip_sync:
        description: Skip syncing translations back to repo
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout builder repo (patches, scripts, fonts)
        uses: actions/checkout@v6
        with:
          repository: wzmwayne/meteor-client-auto-cn-builder
          path: builder
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Checkout upstream Meteor Client
        uses: actions/checkout@v6
        with:
          repository: MeteorDevelopment/meteor-client
          ref: ${{ inputs.upstream_ref }}
          path: meteor-client

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Copy patches, scripts, fonts to upstream checkout
        run: |
          cp -r builder/patches/*.patch meteor-client/
          cp -r builder/scripts/ meteor-client/scripts/
          mkdir -p "meteor-client/src/main/resources/assets/meteor-client/fonts/"
          cp builder/fonts/*.ttf "meteor-client/src/main/resources/assets/meteor-client/fonts/"

      - name: Apply patches
        working-directory: meteor-client
        run: |
          TRANSLATE_PATCHES="Utils.patch MeteorGuiTheme.patch WMeteorModule.patch"
          SKIP_TRANSLATE="${{ inputs.skip_translate }}"
          for p in ../builder/patches/*.patch; do
            name=$(basename "$p")
            if [ "$SKIP_TRANSLATE" = "true" ]; then
              skip=false
              for tp in $TRANSLATE_PATCHES; do
                if [ "$name" = "$tp" ]; then skip=true; break; fi
              done
              if [ "$skip" = "true" ]; then
                echo "Skipping $name (translate skipped)"
                continue
              fi
            fi
            echo "Applying $name..."
            if ! git apply "$p"; then
              echo "::error::Failed to apply $name - upstream may have changed"
              exit 1
            fi
          done
          echo "All patches applied successfully"

      - name: Run translation
        if: ${{ !inputs.skip_translate }}
        working-directory: meteor-client
        run: |
          pip install deep-translator -q
          python3 scripts/translate.py

      - name: Build with Gradle
        working-directory: meteor-client
        run: |
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="cn-$(date +%Y%m%d%H%M)"
          fi
          ./gradlew build -Pbuild_number="$BUILD_NUMBER" --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: meteor-client-chinese-${{ github.run_id }}
          path: meteor-client/build/libs/*.jar
          retention-days: 30

      - name: Sync translations back to builder repo
        if: ${{ !inputs.skip_translate && !inputs.skip_sync }}
        working-directory: builder
        run: |
          cp ../meteor-client/scripts/translations.json scripts/translations.json
          git config user.name "Meteor CN Builder Bot"
          git config user.email "bot@meteor.cn"
          git add scripts/translations.json
          if git diff --cached --quiet; then
            echo "No changes to translations.json"
          else
            git commit -m "sync: update translations from upstream ${{ inputs.upstream_ref }}"
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/wzmwayne/meteor-client-auto-cn-builder.git"
            git push
          fi
